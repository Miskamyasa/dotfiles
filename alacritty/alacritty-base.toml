[general]
live_config_reload = true

[terminal.shell]
program = "/opt/homebrew/bin/tmux" 
args = ["-l","-c","tmux attach -t alacritty || tmux new -s alacritty"]

[cursor]
style = { shape = "Block", blinking = "Never" }
unfocused_hollow = false

[window]
padding = { x = 3, y = 4 }
decorations = "buttonless"
option_as_alt = "Both"
startup_mode = "Fullscreen"
dynamic_title = false

[font]
normal = { family = "ZedMono Nerd Font", style = "Regular" }
bold = { family = "ZedMono Nerd Font", style = "Medium" }
italic = { family = "ZedMono Nerd Font", style = "Regular" }
bold_italic = { family = "ZedMono Nerd Font", style = "Medium" }
size = 14
offset = { y = 0, x = 0 }  

# Color scheme will be imported from either alacritty-dark.toml or alacritty-light.toml
# depending on the system appearance mode.
